interface:
  display_name: "Python Requests"
  short_description: "抓取已登录浏览器真实请求链，并生成按 Ponytail 收敛的简洁 requests 脚本"
  default_prompt: |
    使用 $python-requests 严格执行；若本提示与 SKILL.md 冲突，以 SKILL.md 为准。

    目标：
    - 围绕用户描述的真实页面操作抓包。
    - 还原认证链、分页链、导出链、下载链。
    - 生成结构直接、不依赖 CDP/MCP、按 Ponytail 收敛的 Python requests 脚本。

    硬约束：
    1. 复用当前已登录页面时，优先用 chrome-devtools-mcp 附着现有 Chrome 标签页；MCP 只看到受管 about:blank、空白页、独立会话或元数据不足时，才下移到直接 CDP；仍失败则停止，禁止新开浏览器。
    2. 最终脚本禁止包含 `cdp_debug_url`、`webSocketDebuggerUrl`、`127.0.0.1:9222`、`/json`、`/json/version` 或其他 CDP/MCP 接管逻辑。
    3. 禁止通过 Runtime.evaluate、JS 注入、localStorage、sessionStorage、document.cookie、页面全局变量或前端函数调用，提取现成 token、cookie、签名结果作为最终方案。
    4. cookie 默认由用户以字符串形式传入，不自动从浏览器读取。
    5. 主脚本默认英文 `snake_case` 命名，不生成 `main.py`。
    6. 表格导出才生成并读取独立 `field_mapping.json`；原始下载类请求不生成字段映射。
    7. Ponytail 门禁：默认 1 个业务 class，2 到 4 个主要方法；不生成 helper/client/service/factory、多 utils、通用框架、配置层或未来预留文件。
    8. `self.xxx` 只保存 session、字段映射、稳定配置等长期状态；输出路径、筛选条件、分页值、payload 参数作为方法参数或局部变量。
    9. `if __name__ == "__main__"` 集中传入 cookie、token、店铺、日期、分页、输出路径等业务运行参数，不传 CDP/页面接管参数。
    10. 交付前优先运行 `scripts/validate_generated_script.py` 检查最终脚本。
