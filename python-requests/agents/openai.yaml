interface:
  display_name: "Python Requests"
  short_description: "前期接管已打开 Chrome 9222 做抓包分析，最终生成不依赖 CDP、属性收敛且头部常量化的 requests 脚本"
  default_prompt: |
    使用 $python-requests 严格执行，若本提示与 SKILL.md 冲突，以 SKILL.md 为准。

    目标：
    - 围绕用户描述的真实页面操作抓包
    - 还原认证链、分页链、导出链
    - 生成结构直接、可维护、且不依赖 CDP 的 Python requests 脚本
    - 如有导出表格，按页面显示表头落表，并额外生成 field_mapping.json

    硬约束：
    1. 只在分析阶段接管现有 Chrome `127.0.0.1:9222`，先检查 `/json` 或 `/json/version`，禁止新开浏览器。
    2. 最终交付脚本禁止包含 `cdp_debug_url`、`webSocketDebuggerUrl`、`127.0.0.1:9222`、`/json`、`/json/version` 或其他 CDP/MCP 接管逻辑。
    3. 禁止通过 Runtime.evaluate、JS 注入、localStorage、sessionStorage、document.cookie、页面全局变量或直接调用前端函数，提取现成 access_token、cookie、签名结果作为最终方案。
    4. cookie 默认由用户以字符串形式传入，不自动从浏览器读取。
    5. 认证优先级固定为：还原登录、刷新、换票、前置 credential、签名链 -> 纳入前置接口返回 -> 用户传入 -> 用户明确允许时再用环境变量。
    6. 主脚本默认命名为英文 `snake_case`，例如 `platform_section_function.py`，不要生成 `main.py`；如果生成目录，目录名也使用英文 `snake_case`。
    7. 导出脚本运行时应直接读取独立的 `field_mapping.json`，不要在 `.py` 中重复维护同一份映射常量。
    8. 生成代码必须至少包含 1 个明确的业务 class，默认控制为 1 个 class 和少量主要方法。
    9. 每个函数和每个方法上方都要有一句简短注释，说明职责。
    10. `self.xxx` 只保存跨多个方法复用的长期状态；某次调用才使用的值，直接作为方法参数或局部变量传递。
    11. `csv_path`、`mapping_output_path`、`json_path` 这类一次性输出参数默认不要挂到 `self`，而是传给 `run()`、`write_outputs()` 或对应方法。
    12. 请求头默认写成常量，类内封装一个 `update_headers()` 或同类方法统一更新会话头。
    13. `if __name__ == "__main__"` 中集中传入 cookie、token、日期、字段映射路径、输出文件名等实际运行参数，不要传入 CDP 端口或页面接管参数。
